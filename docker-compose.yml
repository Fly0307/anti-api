services:
  anti-api:
    build:
      context: .
      args:
        BUN_IMAGE: ${BUN_IMAGE:-oven/bun:1.1.38}
    ports:
      - "8964:8964"
      - "51121:51121"
      - "2455-2465:2455-2465"
    environment:
      ANTI_API_DATA_DIR: /app/data
      ANTI_API_OAUTH_NO_OPEN: "1"
      ANTI_API_NO_OPEN: "1"
      ANTI_API_CODEX_CALLBACK_PORT: "2455"
    volumes:
      - ${HOME}/.anti-api:/app/data
    restart: unless-stopped
